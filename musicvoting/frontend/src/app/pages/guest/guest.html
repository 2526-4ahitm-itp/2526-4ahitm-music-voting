<div class="music-voting-container">
  <div class="main-wrapper">
    <div class="sticky-top">
      <nav class="navbar">
        <header class="header">
          <h1>Suche nach deinen Lieblingssongs!</h1>
        </header>
      </nav>

      <div class="search-section">
        <div class="search-bar">
          <form (submit)="search(); $event.preventDefault()" class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input
              #searchField
              type="search"
              placeholder="Suchen..."
              [ngModel]="searchQuery()"
              (input)="searchQuery.set(searchField.value)"
              name="search"
              enterkeyhint="search"
              autocomplete="off"
            >
            <button type="submit" style="display: none;"></button>
          </form>
        </div>
      </div>
    </div>

    <main class="main-content">
      <div class="track-list">
        @for (track of tracks(); track track.id) {
          <div class="track-card">
            <img class="album-cover"
                 [src]="track.album?.images?.[0]?.url || 'assets/placeholder.png'"
                 alt="Cover">

            <div class="track-info">
              <span class="track-name">{{ track.name }}</span>
              <span class="artist-name">{{ track.artists[0]?.name }}</span>
            </div>

            <button class="add-button" (click)="addToPlaylist(track)" [disabled]="addingTrackId === track.id || inQueueUris.has(track.uri)">
              @if (addingTrackId === track.id || inQueueUris.has(track.uri)) {
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
              } @else {
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
              }
            </button>
          </div>
        } @empty {
          <div class="empty-state">
            @if (!isSearching() && searchQuery().length === 0) {
              <div class="welcome-screen">
                <div class="icon-circle">
                  <span class="main-icon">🎵</span>
                </div>
                <h2>Bereit für Musik?</h2>
                <p>Gib einen Song oder Künstler oben ein, um die Playlist zu füllen.</p>
              </div>
            }
          </div>
        }
      </div>
    </main>
  </div>

  <nav class="bottom-nav">
    <button class="bottom-nav-btn" routerLink="/voting">Voten</button>
    <button class="bottom-nav-btn active" routerLink="/guest">Hinzufügen</button>
  </nav>
</div>
