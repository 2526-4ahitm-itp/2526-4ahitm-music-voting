services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: musicvoting
      POSTGRES_USER: musicvoting
      POSTGRES_PASSWORD: musicvoting
    ports:
      - "5432:5432"
    volumes:
      - ./backend/setup.sql:/docker-entrypoint-initdb.d/setup.sql
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
