name: Build, Push & Deploy

on:
  push:
    branches: [main, feature/deployment]
    paths:
      - "musicvoting/**"
      - "k8s/**"
      - ".github/workflows/build-push-deploy.yml"
  workflow_dispatch:

env:
  BACKEND_IMAGE: ghcr.io/2526-4ahitm-itp/music-voting-backend
  FRONTEND_IMAGE: ghcr.io/2526-4ahitm-itp/music-voting-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: musicvoting/backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: musicvoting/frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Apply k8s manifests
        run: kubectl apply -f k8s/ -n student-it220241

      - name: Rollout restart to pull new images
        run: |
          kubectl rollout restart deployment/backend -n student-it220241
          kubectl rollout restart deployment/frontend -n student-it220241
          kubectl rollout status deployment/backend -n student-it220241 --timeout=120s
          kubectl rollout status deployment/frontend -n student-it220241 --timeout=120s
