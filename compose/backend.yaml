services:
  backend:
    container_name: backend
    image: ghcr.io/mgnadlinger/music-voting-backend:latest
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/q/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/musicvoting
      - QUARKUS_DATASOURCE_USERNAME=musicvoting
      - QUARKUS_DATASOURCE_PASSWORD=musicvoting
    depends_on:
      postgres:
        condition: service_healthy
