# ============================================================
#  MusicVoting — komplettes Deployment hinter Reverse-Proxy
#
#  Start:   cd deploy && cp .env.example .env  (Werte eintragen!)
#           docker compose up -d --build
#
#  Es sind KEINE Domainnamen hardcodiert — alles kommt aus .env.
#  Welcher Platzhalter wo verwendet wird, steht in PLACEHOLDERS.md.
# ============================================================
name: musicvoting

services:
  # ---- Reverse-Proxy + automatisches HTTPS -------------------------
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP (Let's-Encrypt-Challenge + Redirect auf HTTPS)
      - "443:443"   # HTTPS
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # gespeicherte TLS-Zertifikate (nicht löschen!)
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  # ---- Angular-Frontend (nginx, baut aus dem Repo) -----------------
  frontend:
    build:
      context: ../musicvoting/frontend
    container_name: frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started

  # ---- Quarkus-Backend (baut aus dem Repo) -------------------------
  backend:
    build:
      context: ../musicvoting/backend
    container_name: backend
    restart: unless-stopped
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - QUARKUS_DATASOURCE_USERNAME=${POSTGRES_USER}
      - QUARKUS_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      # Öffentliche Adresse (hinter dem Reverse-Proxy ist das HTTPS/443):
      - APP_PUBLIC_HOST=${DOMAIN}
      - APP_PUBLIC_PORT=443
      - APP_WEB_PORT=80
      # URLs, die der Server nach außen ausgibt (QR-Code + OAuth-Redirects):
      - MUSICVOTING_JOIN_BASE_URL=https://${DOMAIN}/join
      - SPOTIFY_REDIRECT_URI=https://${DOMAIN}/api/spotify/callback
      - SPOTIFY_WEB_REDIRECT_URI=https://${DOMAIN}/select-playlist
      - SPOTIFY_IOS_REDIRECT_URI=musicvotingapp://callback
      # Spotify-Credentials + Queue-Auffüll-Einstellungen:
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_MARKET=${SPOTIFY_MARKET}
      - SPOTIFY_TOPCHARTS_PLAYLIST_ID=${SPOTIFY_TOPCHARTS_PLAYLIST_ID}
    healthcheck:
      # Port-Check ohne Abhängigkeit von wget/curl (bash ist im JRE-Image vorhanden).
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  # ---- PostgreSQL --------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Schema-Init beim ERSTEN Start (leeres Volume). Quelle: backend/setup.sql.
      - ../musicvoting/backend/setup.sql:/docker-entrypoint-initdb.d/setup.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
