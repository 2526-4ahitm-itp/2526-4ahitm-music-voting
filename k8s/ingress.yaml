apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: musicvoting-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: it220241.cloud.htl-leonding.ac.at
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
