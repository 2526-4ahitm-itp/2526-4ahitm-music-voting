apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          image: ghcr.io/2526-4ahitm-itp/music-voting-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://postgres:5432/musicvoting"
            - name: QUARKUS_DATASOURCE_USERNAME
              value: "musicvoting"
            - name: QUARKUS_DATASOURCE_PASSWORD
              value: "musicvoting"
            - name: APP_PUBLIC_HOST
              value: "it220241.cloud.htl-leonding.ac.at"
            - name: APP_PUBLIC_PORT
              value: "443"
            - name: APP_WEB_PORT
              value: "80"
            - name: MUSICVOTING_JOIN_BASE_URL
              value: "https://it220241.cloud.htl-leonding.ac.at/join"
            - name: SPOTIFY_REDIRECT_URI
              value: "https://it220241.cloud.htl-leonding.ac.at/api/spotify/callback"
            - name: SPOTIFY_WEB_REDIRECT_URI
              value: "https://it220241.cloud.htl-leonding.ac.at/dashboard"
            - name: SPOTIFY_IOS_REDIRECT_URI
              value: "musicvotingapp://callback"
            - name: SPOTIFY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: spotify-credentials
                  key: client-id
            - name: SPOTIFY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: spotify-credentials
                  key: client-secret
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
