apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/2526-4ahitm-itp/music-voting-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://postgres:5432/musicvoting"
            - name: QUARKUS_DATASOURCE_USERNAME
              value: "musicvoting"
            - name: QUARKUS_DATASOURCE_PASSWORD
              value: "musicvoting"
            - name: APP_PUBLIC_HOST
              value: "it220241.cloud.htl-leonding.ac.at"
            - name: APP_PUBLIC_PORT
              value: "443"
            - name: APP_WEB_PORT
              value: "80"
            - name: MUSICVOTING_JOIN_BASE__URL
              value: "https://it220241.cloud.htl-leonding.ac.at/join"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
